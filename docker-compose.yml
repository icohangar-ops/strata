services:
  postgres:
    image: postgres:16-alpine
    container_name: strata-postgres
    environment:
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata
      POSTGRES_DB: strata
    ports:
      - "5433:5432"
    volumes:
      - strata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  strata_pgdata:
